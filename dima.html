<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Me</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        margin: 0;
        padding: 0;
        text-align: center;
    }

    /* 3 Classes with styles */
    .header {
        background: gold;
        color: black;
        padding: 20px;
    }

    .card {
        background: #222;
        margin: 20px auto;
        padding: 20px;
        width: 80%;
        border-radius: 15px;
        box-shadow: 0 0 10px gold;
    }

    .fun-text {
        color: orange;
        font-size: 20px;
        font-weight: bold;
    }

    /* 5 Styled Tags */
    h1 {
        font-size: 40px;
    }

    h2 {
        color: gold;
    }

    p {
        line-height: 1.6;
    }

    ul {
        list-style-type: square;
        text-align: left;
        display: inline-block;
    }

    img {
        width: 300px;
        border-radius: 15px;
        border: 4px solid gold;
        margin: 10px;
    }
</style>
</head>
<body>

<div class="header">
    <h1>About Me</h1>
    <p class="fun-text">Fun • Kind • Cool</p>
</div>

<div class="card">
    <h2>3 Facts About Me</h2>
    <p>1. I love sports and staying active.</p>
    <p>2. My favorite sport is soccer.</p>
    <p>3. I enjoy cars and having fun.</p>
</div>

<div class="card">
    <h2>My Favorite Things</h2>
    <ul>
        <li>Cars</li>
        <li>Sports</li>
        <li>Money</li>
        <li>Fun adventures</li>
    </ul>
</div>

<div class="card">
    <h2>My Photos</h2>

    <!-- First Photo -->
    <img src="https://images.unsplash.com/photo-1520607162513-77705c0f0d4a" alt="Money">

    <!-- Second Photo -->
    <img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7" alt="Cars">
</div>

</body>
</html>
